<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Prime Property Care — Professional window cleaning, gutter cleaning, pressure washing, solar panel cleaning, and Christmas light installation in Modesto, Turlock, Hughson, Manteca, and Ripon CA. Call (209) 646-2432.">
<title>Prime Property Care | Exterior Cleaning — Modesto, Turlock & the 209</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --charcoal: #1a1d23;
    --charcoal-mid: #252830;
    --charcoal-light: #2f3340;
    --neutral-100: #f5f5f3;
    --neutral-200: #e8e8e4;
    --neutral-400: #9a9a94;
    --neutral-600: #5c5c58;
    --white: #ffffff;
    --accent: #3b82f6;
    --accent-dark: #2563eb;
    --accent-glow: rgba(59,130,246,0.15);
    --radius: 12px;
    --radius-lg: 20px;
    --shadow-card: 0 2px 20px rgba(0,0,0,0.07);
    --shadow-card-hover: 0 8px 40px rgba(0,0,0,0.13);
    --transition: 0.25s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--white);
    color: var(--charcoal);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26,29,35,0.97);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-text strong {
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: -0.01em;
  }

  .logo-text span {
    font-size: 10px;
    font-weight: 500;
    color: var(--neutral-400);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  nav a {
    color: rgba(255,255,255,0.72);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color var(--transition), background var(--transition);
  }

  nav a:hover {
    color: var(--white);
    background: rgba(255,255,255,0.07);
  }

  .nav-cta {
    background: var(--accent) !important;
    color: var(--white) !important;
    padding: 8px 18px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    font-size: 14px !important;
    transition: background var(--transition) !important;
    white-space: nowrap;
  }

  .nav-cta:hover {
    background: var(--accent-dark) !important;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--white);
    border-radius: 2px;
    transition: transform 0.3s, opacity 0.3s;
  }

  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-nav {
    display: none;
    flex-direction: column;
    background: var(--charcoal-mid);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 16px 24px 24px;
    gap: 4px;
  }

  .mobile-nav.open { display: flex; }

  .mobile-nav a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: color var(--transition);
  }

  .mobile-nav a:hover { color: var(--white); }

  .mobile-nav .mobile-cta {
    margin-top: 12px;
    background: var(--accent);
    color: var(--white) !important;
    text-align: center;
    padding: 14px !important;
    border-radius: 10px;
    font-weight: 700 !important;
    border-bottom: none !important;
    font-size: 16px !important;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 92vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    background: var(--charcoal);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://picsum.photos/seed/cleanhouse/1600/900');
    background-size: cover;
    background-position: center 30%;
    opacity: 0.22;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,29,35,0.95) 0%, rgba(26,29,35,0.7) 60%, rgba(26,29,35,0.5) 100%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 80px 24px;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.3);
    color: #93c5fd;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 28px;
    letter-spacing: 0.02em;
  }

  .hero-badge .dot {
    width: 6px;
    height: 6px;
    background: #3b82f6;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero h1 {
    font-size: clamp(38px, 6vw, 72px);
    font-weight: 800;
    color: var(--white);
    line-height: 1.05;
    letter-spacing: -0.03em;
    max-width: 700px;
    margin-bottom: 24px;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero-sub {
    font-size: clamp(16px, 2.2vw, 20px);
    color: rgba(255,255,255,0.65);
    max-width: 520px;
    line-height: 1.6;
    margin-bottom: 44px;
    font-weight: 400;
  }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    align-items: center;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: var(--white);
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 32px;
    border-radius: 10px;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    box-shadow: 0 4px 24px rgba(59,130,246,0.35);
    white-space: nowrap;
  }

  .btn-primary:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(59,130,246,0.45);
  }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 16px 24px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.18);
    transition: background var(--transition), border-color var(--transition);
    white-space: nowrap;
  }

  .btn-ghost:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.3);
  }

  .hero-trust {
    margin-top: 56px;
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    align-items: center;
  }

  .trust-stat {
    display: flex;
    flex-direction: column;
  }

  .trust-stat strong {
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .trust-stat span {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 3px;
  }

  .trust-divider {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.15);
  }

  .stars-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stars {
    display: flex;
    gap: 2px;
  }

  .stars svg {
    width: 18px;
    height: 18px;
    fill: #fbbf24;
  }

  .stars-label {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
  }

  /* ── SECTION COMMONS ── */
  section { padding: 96px 24px; }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .section-title {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--charcoal);
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .section-sub {
    font-size: 17px;
    color: var(--neutral-600);
    max-width: 540px;
    line-height: 1.65;
  }

  .section-header {
    margin-bottom: 60px;
  }

  /* ── SERVICES ── */
  #services {
    background: var(--neutral-100);
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .service-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    transition: transform var(--transition), box-shadow var(--transition);
    display: flex;
    flex-direction: column;
  }

  .service-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-card-hover);
  }

  .service-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .service-body {
    padding: 28px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .service-icon {
    width: 44px;
    height: 44px;
    background: var(--accent-glow);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    flex-shrink: 0;
  }

  .service-icon svg {
    width: 22px;
    height: 22px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .service-card h3 {
    font-size: 19px;
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 10px;
    letter-spacing: -0.02em;
  }

  .service-card p {
    font-size: 14px;
    color: var(--neutral-600);
    line-height: 1.65;
    flex: 1;
  }

  .service-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    color: var(--accent);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: gap var(--transition);
  }

  .service-link:hover { gap: 10px; }

  /* ── GALLERY ── */
  #gallery {
    background: var(--charcoal);
    padding-bottom: 80px;
  }

  #gallery .section-label { color: #93c5fd; }
  #gallery .section-title { color: var(--white); }
  #gallery .section-sub { color: rgba(255,255,255,0.5); }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    grid-template-rows: auto;
    gap: 16px;
  }

  .gallery-item {
    border-radius: var(--radius);
    overflow: hidden;
    position: relative;
    background: var(--charcoal-light);
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .gallery-item:hover img { transform: scale(1.04); }

  .gallery-item:nth-child(1) { grid-column: span 7; grid-row: span 2; min-height: 360px; }
  .gallery-item:nth-child(2) { grid-column: span 5; min-height: 170px; }
  .gallery-item:nth-child(3) { grid-column: span 5; min-height: 170px; }
  .gallery-item:nth-child(4) { grid-column: span 4; min-height: 220px; }
  .gallery-item:nth-child(5) { grid-column: span 4; min-height: 220px; }
  .gallery-item:nth-child(6) { grid-column: span 4; min-height: 220px; }

  .gallery-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.02em;
    opacity: 0;
    transition: opacity var(--transition);
  }

  .gallery-item:hover .gallery-caption { opacity: 1; }

  /* ── REVIEWS ── */
  #reviews {
    background: var(--white);
  }

  .reviews-intro {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 40px;
    margin-bottom: 60px;
    flex-wrap: wrap;
  }

  .reviews-score {
    flex-shrink: 0;
    background: var(--charcoal);
    color: var(--white);
    border-radius: var(--radius-lg);
    padding: 32px 40px;
    text-align: center;
    min-width: 200px;
  }

  .score-num {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--white);
  }

  .score-stars {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin: 10px 0 6px;
  }

  .score-stars svg {
    width: 20px;
    height: 20px;
    fill: #fbbf24;
  }

  .score-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .review-card {
    background: var(--neutral-100);
    border-radius: var(--radius-lg);
    padding: 28px;
    border: 1px solid var(--neutral-200);
    transition: box-shadow var(--transition);
  }

  .review-card:hover {
    box-shadow: var(--shadow-card-hover);
  }

  .review-stars {
    display: flex;
    gap: 2px;
    margin-bottom: 14px;
  }

  .review-stars svg {
    width: 16px;
    height: 16px;
    fill: #fbbf24;
  }

  .review-text {
    font-size: 15px;
    color: var(--charcoal);
    line-height: 1.65;
    margin-bottom: 20px;
    font-style: italic;
  }

  .review-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .review-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
  }

  .review-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1.2;
  }

  .review-meta {
    font-size: 12px;
    color: var(--neutral-400);
    margin-top: 2px;
  }

  .google-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--neutral-200);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--neutral-600);
    margin-top: 6px;
  }

  /* ── ABOUT / TRUST BAND ── */
  #about {
    background: var(--charcoal);
    padding: 80px 24px;
  }

  .about-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
  }

  .about-img-wrap {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .about-img-wrap img {
    width: 100%;
    height: 440px;
    object-fit: cover;
    display: block;
  }

  .about-img-badge {
    position: absolute;
    bottom: 24px;
    left: 24px;
    background: rgba(26,29,35,0.92);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--white);
  }

  .about-img-badge strong {
    display: block;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }

  .about-img-badge span {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
  }

  .about-content .section-label { color: #93c5fd; }
  .about-content .section-title { color: var(--white); }

  .about-content p {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    line-height: 1.75;
    margin-bottom: 16px;
  }

  .trust-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 32px;
  }

  .trust-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 14px;
    border-radius: 100px;
  }

  .trust-pill svg {
    width: 14px;
    height: 14px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .service-area-list {
    margin-top: 28px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .area-tag {
    background: var(--accent-glow);
    border: 1px solid rgba(59,130,246,0.25);
    color: #93c5fd;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
  }

  /* ── CTA BAND ── */
  .cta-band {
    background: var(--accent);
    padding: 64px 24px;
    text-align: center;
  }

  .cta-band h2 {
    font-size: clamp(26px, 4vw, 40px);
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  .cta-band p {
    font-size: 17px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 36px;
  }

  .cta-band .btn-white {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    color: var(--accent-dark);
    text-decoration: none;
    font-size: 17px;
    font-weight: 700;
    padding: 18px 36px;
    border-radius: 10px;
    transition: transform var(--transition), box-shadow var(--transition);
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .cta-band .btn-white:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }

  /* ── CONTACT ── */
  #contact {
    background: var(--neutral-100);
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 64px;
    align-items: start;
  }

  .contact-info h3 {
    font-size: 22px;
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .contact-info p {
    font-size: 15px;
    color: var(--neutral-600);
    line-height: 1.7;
    margin-bottom: 32px;
  }

  .contact-links {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact-link {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: var(--charcoal);
    font-size: 15px;
    font-weight: 600;
    padding: 16px 20px;
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--neutral-200);
    transition: border-color var(--transition), box-shadow var(--transition);
  }

  .contact-link:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .contact-link-icon {
    width: 42px;
    height: 42px;
    background: var(--accent-glow);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-link-icon svg {
    width: 20px;
    height: 20px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .contact-link-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .contact-link-text small {
    font-size: 11px;
    font-weight: 500;
    color: var(--neutral-400);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  /* ── FORM ── */
  .contact-form-wrap {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 40px;
    box-shadow: var(--shadow-card);
    border: 1px solid var(--neutral-200);
  }
